<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #survey{
            background-color: beige;
            width: 280px;
            margin-left: 15%;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="survey">
    
    <h1>로보티즈 설문조사</h1>

    <form>
        이름 : 
        <input type="text"
               name="name"
               placeholder="이름을 반드시 입력해주세요.">

        <br>

        주소 : 
        <input type="text"
           name="address">
        
        <br>

        회사 : 
        <input type="text" 
        name="office"
        placeholder="로보티즈"
        disabled
        >

        <br>

        성별 : 
        <input type="radio" name="gender" value="man">남자
        <input type="radio" name="gender" value="woman">여자

        <br>

        전화번호 : 
        <input type="text"
        name="num"
        placeholder="- 를 제외하고 적어주세요"> 

        <br>

        좋아하는 애완 동물은?  <br>
        <input type="checkbox" name="pet" value="dog">강아지
        <input type="checkbox" name="pet" value="cat">고양이
        <input type="checkbox" name="pet" value="bird">앵무새
        <input type="checkbox" name="pet" value="snake">뱀

        <br>

        ID : 
        <input type="text" 
                name="id"
                placeholder="ID를 입력하세요">

        <br>

    PW : 
    <input type="password"
            name="pw"
            placeholder="대/소문자&숫자&특수문자">

        
    <br>

    전하고 싶은 말<br>
    <textarea
        rows="6"
        cols="20"
        name="memo"
        ></textarea>

    <br>

    <a href="\251101\251011_원섭설문완료.html">
    <input type="button"
            name="submit"
            value="전송">
    </a>

    <a href="\251101\251011_원섭홈.html">
    <input type="button"
            name="cancle"
            value="취소">
    </a>    
    </form>
    </div>
</body>
</html>
