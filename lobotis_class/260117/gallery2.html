<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .gallery{
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .item{
            overflow: hidden;
            border: 1px solid black;
            border-radius: 10px;
            background-color: black;
        }
        .item img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .item:hover img{
            transform: scale(1.1);
        }
    </style>
</head>
<body>
<main class="gallery">
    <div class="item"><img src="https://mblogthumb-phinf.pstatic.net/20151125_258/gkfngkfn414_1448438854939IQuMW_JPEG/%C6%F7%C4%CF%B8%F3%BD%BA%C5%CD_%B2%BF%BA%CE%B1%E2_%B1%D7%B8%AE%B1%E212.jpg?type=w420"></div>
    <div class="item"><img src="https://m.hobbytomo.com/web/product/big/hobbytomo_3297.jpg"></div>
    <div class="item"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIOz1KD_RsF-McF-Zew9lGl1hkOdrxaXmCyg&s"></div>
    <div class="item"><img src="https://i.namu.wiki/i/sSuD5pdh2o9SFJ1ODkXIX0gO_Lrpt46Ptswb3eyO-gpIA0JT09L8j3h6-HL_Fzgc_LWH5MhRZAtpcgkp_DSwQg.webp"></div>
    <div class="item"><img src="https://i.namu.wiki/i/vweBdV3RvuqfdH71fQM95kQK72XHuPxn5ztmQXvkTyTrnhD3W_Bms1hi9tStUrIE8Ete2riVVB4sFbgTUmfItQ.webp"></div>
    <div class="item"><img src="https://cafe24.poxo.com/ec01/figurepresso89/BhNwo1jckXH28PSBZRxpvrRNVBIPVsjIZXgklj2fzlwtz4XBkYsUeuG/tl2zOxkvgioVJTtBnfs8EcuagkLTXA==/_/web/product/big/201907/a86364a9a8cb18cfdbf299be94e89b06.jpg"></div>
</main>
</body>
</html>
